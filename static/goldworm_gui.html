<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoldWorm Neural GUI</title>
<style>
:root{--bg:#07080c;--panel:#1a1c23;--panel2:#20242d;--card:#111827;--line:#374151;--soft:#2a303b;--text:#f3f4f6;--muted:#9ca3af;--green:#00ff88;--cyan:#00e5ff;--gold:#ffd84d;--orange:#ff9f43;--red:#ff4d6d;--shadow:0 18px 48px rgba(0,0,0,.36)}
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;height:100%}body{font-family:Inter,Segoe UI,system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}button,input{font:inherit}button{border:0}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#4b5563;border-radius:999px}.shell{display:grid;grid-template-rows:56px 28px minmax(0,1fr)34px;width:100vw;height:100vh;background:radial-gradient(circle at top left,rgba(0,229,255,.08),transparent 34%),var(--bg)}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 16px;background:rgba(13,16,23,.98);border-bottom:1px solid var(--line);box-shadow:var(--shadow);z-index:4}.brand{display:flex;align-items:center;gap:12px;min-width:170px}.mark{width:32px;height:32px;border-radius:8px;background:#111827;border:1px solid var(--line);display:grid;place-items:center;box-shadow:0 0 20px rgba(0,255,136,.18)}.brand-title{font-weight:900;color:var(--gold)}
.tabs{display:inline-flex;gap:4px;padding:4px;border-radius:8px;background:#111827;border:1px solid var(--line)}.tab{min-width:82px;height:34px;border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;transition:.16s}.tab:hover{background:rgba(55,65,81,.65);color:var(--text)}.tab.active{color:#02130c;background:linear-gradient(135deg,var(--green),var(--cyan));box-shadow:0 0 0 1px rgba(0,229,255,.75),0 0 18px rgba(0,255,136,.42)}
.status{display:flex;gap:12px;align-items:center;justify-content:flex-end;min-width:220px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}.pill{display:inline-flex;align-items:center;gap:8px;height:28px;padding:0 10px;border-radius:999px;background:#111827;border:1px solid var(--line)}.dot{width:9px;height:9px;border-radius:999px;background:var(--gold);color:var(--gold);box-shadow:0 0 12px currentColor}.dot.ok{background:var(--green);color:var(--green)}
.banner{display:flex;align-items:center;justify-content:center;background:rgba(255,216,77,.12);border-bottom:1px solid rgba(255,216,77,.28);color:var(--gold);font-size:11px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase}.banner.ok{background:rgba(0,255,136,.10);border-color:rgba(0,255,136,.28);color:var(--green)}
.work{position:relative;min-height:0;overflow:hidden;padding:12px}.canvas-bg{position:fixed;inset:84px 0 34px 0;width:100%;height:calc(100vh - 118px);z-index:0;pointer-events:none;opacity:.42}.layout{position:relative;z-index:1;height:100%;min-height:0;display:grid;gap:12px}.layout-mini{grid-template-columns:minmax(320px,720px);justify-content:center}.layout-classic{grid-template-columns:minmax(380px,1fr)minmax(340px,420px)}.layout-max{grid-template-columns:minmax(380px,1fr)minmax(330px,380px)minmax(330px,430px)}
.panel{min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.panel-strong{background:var(--panel2);border-color:#4b5563}.head{min-height:42px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;background:#111827;border-bottom:1px solid var(--line);flex:0 0 auto}.title{font-size:12px;font-weight:900;letter-spacing:1px;text-transform:uppercase}.sub{font-size:11px;color:var(--muted)}.body{min-height:0;padding:12px;overflow:auto}
.chat{height:100%}.log{flex:1 1 auto;min-height:0;max-height:calc(100vh - 232px);overflow-y:auto;overflow-x:hidden;padding:14px;background:rgba(7,8,12,.42);scroll-behavior:auto}.layout-mini .log{max-height:34vh}.messages{display:flex;flex-direction:column;gap:10px;min-height:100%}.empty{margin:auto;color:var(--muted);border:1px dashed #4b5563;border-radius:8px;padding:18px;text-align:center;background:rgba(17,24,39,.72)}.msg{max-width:86%;padding:11px 13px;border-radius:8px;line-height:1.5;font-size:13px;white-space:pre-wrap;overflow-wrap:anywhere}.msg-user{align-self:flex-end;background:rgba(0,255,136,.13);border:1px solid rgba(0,255,136,.34);color:#eafff4}.msg-bot{align-self:flex-start;background:#111827;border:1px solid rgba(0,229,255,.32)}.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.7px;text-transform:uppercase}.badge{display:inline-flex;padding:2px 6px;border-radius:4px;background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}.badge-rust{background:rgba(0,255,136,.12);color:var(--green);border-color:rgba(0,255,136,.32)}.badge-sim{background:rgba(255,216,77,.12);color:var(--gold);border-color:rgba(255,216,77,.30)}.input-row{display:grid;grid-template-columns:minmax(0,1fr)auto;gap:10px;padding:12px;background:#111827;border-top:1px solid var(--line);flex:0 0 auto}.input{width:100%;height:42px;border-radius:7px;border:1px solid #4b5563;background:#0b0f16;color:var(--text);padding:0 12px;outline:none}.input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,.18)}.btn{height:42px;border-radius:7px;padding:0 14px;background:var(--green);color:#03130b;font-weight:900;cursor:pointer}.btn:disabled{opacity:.48;cursor:not-allowed}
.stack{display:flex;flex-direction:column;gap:12px;min-height:0;overflow:auto}.card{background:#111827;border:1px solid var(--line);border-radius:8px;padding:12px;box-shadow:0 8px 26px rgba(0,0,0,.22)}.card.training{border-color:rgba(255,216,77,.42);background:linear-gradient(180deg,rgba(255,216,77,.10),#111827 58%)}.card.echo{border-color:rgba(0,229,255,.38);background:linear-gradient(180deg,rgba(0,229,255,.10),#111827 58%)}.card.monitor{border-color:rgba(0,255,136,.36);background:linear-gradient(180deg,rgba(0,255,136,.08),#111827 58%)}.label{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12px;font-weight:900;letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px}.value{color:var(--gold);font-family:Consolas,monospace}.slider{display:grid;gap:6px;margin-top:10px}.slider-label{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase}input[type=range]{width:100%;accent-color:var(--cyan)}.phase-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.phase{min-height:36px;border-radius:6px;background:#0b0f16;color:var(--muted);border:1px solid var(--line);cursor:pointer;font-size:10px;font-weight:900;letter-spacing:.7px;text-transform:uppercase}.phase.active{color:#03130b;background:var(--green);border-color:var(--green);box-shadow:0 0 14px rgba(0,255,136,.36)}.phase.training.active{background:var(--gold);border-color:var(--gold)}.phase.consolidating.active{background:var(--orange);border-color:var(--orange)}.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px}.toggle input{width:18px;height:18px;accent-color:var(--green)}.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}.metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.metric{background:#0b0f16;border:1px solid var(--soft);border-radius:7px;padding:10px}.metric-name{color:var(--muted);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.9px}.metric-value{margin-top:5px;font-size:20px;font-weight:900;font-family:Consolas,monospace}.viz-stack{display:grid;grid-template-rows:minmax(210px,1fr)minmax(210px,1fr);gap:12px;min-height:0}.heatmap{display:grid;grid-template-columns:repeat(16,minmax(8px,1fr));gap:3px;min-height:160px}.cell{aspect-ratio:1/1;border-radius:3px;border:1px solid rgba(255,255,255,.05)}.plot-host{min-height:180px;display:grid;place-items:stretch}.plot-svg{width:100%;height:190px;background:#0b0f16;border:1px solid var(--soft);border-radius:7px}.fallback{display:grid;place-items:center;min-height:160px;color:var(--muted);background:#0b0f16;border:1px dashed #4b5563;border-radius:7px;padding:14px;text-align:center}.foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 16px;background:rgba(13,16,23,.98);border-top:1px solid var(--line);color:var(--muted);font-size:11px}
@media(max-width:1180px){.layout-max{grid-template-columns:minmax(360px,1fr)minmax(320px,420px)}.viz-col{display:none}}@media(max-width:820px){body{overflow:auto}.shell{min-height:100vh;height:auto;grid-template-rows:auto auto auto auto}.top{height:auto;flex-wrap:wrap;padding:10px}.tabs{order:3;width:100%}.tab{flex:1;min-width:0}.work{min-height:900px}.layout,.layout-classic,.layout-max,.layout-mini{grid-template-columns:1fr}.canvas-bg{display:none}.log{max-height:360px}}
</style>
</head>
<body>
<div class="shell">
<header class="top">
  <div class="brand"><div class="mark" aria-hidden="true"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="6" cy="12" r="2.5" fill="#00ff88"/><circle cx="12" cy="6" r="2.5" fill="#00e5ff"/><circle cx="18" cy="12" r="2.5" fill="#ffd84d"/><circle cx="12" cy="18" r="2.5" fill="#00ff88"/><path d="M6 12 12 6 18 12 12 18Z" fill="none" stroke="#6ee7ff" stroke-width="1" opacity=".65"/></svg></div><div class="brand-title">GoldWorm</div></div>
  <nav class="tabs" aria-label="Display mode"><button class="tab active" type="button" data-mode="mini">Mini</button><button class="tab" type="button" data-mode="classic">Classic</button><button class="tab" type="button" data-mode="max">Max</button></nav>
  <div class="status"><span class="pill"><span id="connDot" class="dot"></span><span id="connLabel">SIM</span></span><span class="pill"><span id="phaseDot" class="dot ok"></span><span id="phaseText">INFERENCE</span></span></div>
</header>
<div id="banner" class="banner">Simulation mode - backend not verified</div>
<main class="work"><canvas id="neuralCanvas" class="canvas-bg" aria-hidden="true"></canvas><div id="appContent" class="layout layout-mini"></div></main>
<footer class="foot"><span>GoldWorm Neural Engine v1.0</span><span id="footerStatus">Zero Trust Local Runtime</span></footer>
</div>
<script>
(function(){
'use strict';
const DEFAULT_METRICS=Object.freeze({entropy:2.3,branchingRatio:.85,correlationLength:4.2,avalancheExponent:1.35,echoDepth:.42,activeNeurons:23});
const state={mode:'mini',phase:'inference',temperature:.5,kCreativity:1.5,maxTokens:15,liveMetrics:false,autoScroll:false,backendConnected:false,simulationMode:true,draftInput:'',messages:[],metrics:{...DEFAULT_METRICS},neuronSignals:buildSignals(),cosineSeries:buildSeries(),isSending:false,lastRenderedMessageId:null,previousMessageCount:0,userScrolledLog:false};
const dom={};
function safeGet(id){return typeof id==='string'&&id.length>0?document.getElementById(id):null}
function safeText(v,f=''){return v===null||v===undefined?f:String(v)}
function esc(v){const d=document.createElement('div');d.textContent=safeText(v);return d.innerHTML}
function clamp(v,min,max){const n=Number(v);return Number.isFinite(n)?Math.max(min,Math.min(max,n)):min}
function debounce(fn,wait){let t=null;return(...args)=>{if(t!==null)clearTimeout(t);t=setTimeout(()=>fn(...args),wait)}}
function id(prefix){return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,10)}`}
function buildSignals(){return Array.from({length:256},(_,i)=>clamp((Math.sin(i*.29)*.5+.5)*.72+(i%17===0?.35:0),.04,1))}
function buildSeries(){return Array.from({length:42},(_,i)=>({x:i,y:clamp(Math.sin(i*.34)*.19+Math.cos(i*.11)*.08+.11,-.22,.42)}))}
function validNumbers(v){return Array.isArray(v)&&v.length>0&&v.every(x=>Number.isFinite(Number(x)))}
function validSeries(v){return Array.isArray(v)&&v.length>1&&v.every(p=>p&&Number.isFinite(Number(p.x))&&Number.isFinite(Number(p.y)))}
function base(){return (window.location&&window.location.protocol)==='file:'?'http://127.0.0.1:9090':''}
function init(){dom.app=safeGet('appContent');dom.banner=safeGet('banner');dom.connDot=safeGet('connDot');dom.footer=safeGet('footerStatus');bindTabs();initCanvas();renderApp();probeBackend();setInterval(probeBackend,3000);setInterval(()=>{if(!state.liveMetrics)return;updateLiveMetrics();renderMetricsOnly()},3000)}
function bindTabs(){document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{const m=tab?.dataset?.mode;if(!['mini','classic','max'].includes(m))return;captureDraft();state.mode=m;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tab));renderApp({preserveLog:true})})})}
function captureDraft(){const input=safeGet('chatInput');if(input&&!state.isSending)state.draftInput=input.value||''}
function renderApp(opts={}){if(!dom.app)return;captureDraft();const oldLog=safeGet('logContainer');const oldScroll=oldLog?oldLog.scrollTop:0;const oldUserScrolled=state.userScrolledLog;dom.app.className=`layout layout-${state.mode}`;dom.app.innerHTML=layoutHtml();bindControls();updateStatus();renderMessages({preserveScrollTop:opts.preserveLog?oldScroll:null,preserveUserScrolled:oldUserScrolled});renderHeatmap(state.neuronSignals);renderPlot(state.cosineSeries);renderMetricsOnly()}
function layoutHtml(){const chat=chatHtml(),controls=controlsHtml(),viz=vizHtml();if(state.mode==='mini')return `${chat}<section class="panel panel-strong">${controls}${viz}</section>`;if(state.mode==='classic')return `${chat}<section class="panel panel-strong">${controls}${viz}</section>`;return `${chat}<section class="panel panel-strong">${controls}</section><section class="viz-col viz-stack">${viz}</section>`}
function chatHtml(){return `<section class="panel chat" aria-label="GoldWorm log output"><div class="head"><div><div class="title">Signal Log</div><div class="sub">Stable output, explicit scroll only</div></div><label class="toggle"><input id="autoScrollToggle" type="checkbox" ${state.autoScroll?'checked':''}> Auto-scroll</label></div><div id="logContainer" class="log"><div id="messageList" class="messages"></div></div><div class="input-row"><input id="chatInput" class="input" type="text" autocomplete="off" spellcheck="false" placeholder="Feed the worm..." value="${esc(state.draftInput)}"><button id="sendBtn" class="btn" type="button" ${state.isSending?'disabled':''}>Send</button></div></section>`}
function controlsHtml(){return `<div class="head"><div><div class="title">Runtime Controls</div><div class="sub">Local zero-trust execution</div></div></div><div class="body stack"><div class="card monitor"><div class="label"><span>Backend Monitor</span><span id="backendState" class="value">${state.backendConnected?'RUST':'SIM'}</span></div><button id="verifyBackendBtn" class="btn" type="button">Verify Rust Engine</button></div><div class="card training"><div class="label"><span>Training</span><span class="value" id="phaseValue">${esc(state.phase.toUpperCase())}</span></div><div class="phase-grid"><button class="phase ${state.phase==='inference'?'active':''}" type="button" data-phase="inference">Inference</button><button class="phase training ${state.phase==='training'?'active':''}" type="button" data-phase="training">Training</button><button class="phase consolidating ${state.phase==='consolidating'?'active':''}" type="button" data-phase="consolidating">Consolidate</button></div><div class="slider"><div class="slider-label"><span>Temperature</span><span id="tempValue">${state.temperature.toFixed(2)}</span></div><input id="tempSlider" type="range" min="0.01" max="5" step="0.01" value="${state.temperature}"></div><div class="slider"><div class="slider-label"><span>K-Creativity</span><span id="kValue">${state.kCreativity.toFixed(2)}</span></div><input id="kSlider" type="range" min="0" max="5" step="0.01" value="${state.kCreativity}"></div><div class="slider"><div class="slider-label"><span>Max Tokens</span><span id="tokenValue">${state.maxTokens}</span></div><input id="tokenSlider" type="range" min="1" max="64" step="1" value="${state.maxTokens}"></div></div><div class="card echo"><div class="label"><span>Echo Reservoir</span><span id="echoValue" class="value">${Math.round(state.metrics.echoDepth*100)}%</span></div><div class="metrics"><div class="metric"><div class="metric-name">Entropy</div><div id="entropyMetric" class="metric-value">${state.metrics.entropy.toFixed(1)}</div></div><div class="metric"><div class="metric-name">Branching</div><div id="branchingMetric" class="metric-value">${state.metrics.branchingRatio.toFixed(2)}</div></div><div class="metric"><div class="metric-name">Corr Length</div><div id="corrMetric" class="metric-value">${state.metrics.correlationLength.toFixed(1)}</div></div><div class="metric"><div class="metric-name">Avalanche</div><div id="avalancheMetric" class="metric-value">${state.metrics.avalancheExponent.toFixed(2)}</div></div></div><div class="toggle-row"><span class="toggle">Live Metrics</span><label class="toggle"><input id="liveMetricsToggle" type="checkbox" ${state.liveMetrics?'checked':''}> Dynamic</label></div></div></div>`}
function vizHtml(){return `<section class="panel"><div class="head"><div><div class="title">Neuron Heatmap</div><div class="sub">Defensive 302-neuron signal surface</div></div><span id="activeNeuronValue" class="value">${state.metrics.activeNeurons}</span></div><div class="body"><div id="heatmapHost" class="heatmap"></div></div></section><section class="panel"><div class="head"><div><div class="title">Plotly Map</div><div class="sub">Cosine similarity trace with SVG fallback</div></div></div><div class="body"><div id="plotHost" class="plot-host"></div></div></section>`}
function bindControls(){const input=safeGet('chatInput'),send=safeGet('sendBtn'),log=safeGet('logContainer'),auto=safeGet('autoScrollToggle'),live=safeGet('liveMetricsToggle'),verify=safeGet('verifyBackendBtn'),temp=safeGet('tempSlider'),k=safeGet('kSlider'),tok=safeGet('tokenSlider');if(input){input.value=state.draftInput;input.addEventListener('input',()=>{state.draftInput=input.value||''});input.addEventListener('keydown',e=>{if(e?.key==='Enter')sendMessage()})}if(send)send.addEventListener('click',sendMessage);if(auto)auto.addEventListener('change',()=>{state.autoScroll=auto.checked===true});if(live)live.addEventListener('change',()=>{state.liveMetrics=live.checked===true;renderMetricsOnly()});if(verify)verify.addEventListener('click',probeBackend);if(temp)temp.addEventListener('input',()=>{state.temperature=Number(temp.value)||.5;text('tempValue',state.temperature.toFixed(2))});if(k)k.addEventListener('input',()=>{state.kCreativity=Number(k.value)||0;text('kValue',state.kCreativity.toFixed(2))});if(tok)tok.addEventListener('input',()=>{state.maxTokens=parseInt(tok.value,10)||15;text('tokenValue',String(state.maxTokens))});if(log)log.addEventListener('scroll',debounce(()=>{const max=Math.max(0,log.scrollHeight-log.clientHeight);state.userScrolledLog=log.scrollTop<max-24},120));document.querySelectorAll('.phase').forEach(btn=>btn.addEventListener('click',()=>{const p=btn?.dataset?.phase;if(!['inference','training','consolidating'].includes(p))return;captureDraft();state.phase=p;renderApp({preserveLog:true})}))}
function renderMessages(opts={}){const list=safeGet('messageList'),log=safeGet('logContainer');if(!list||!log)return;const before=state.previousMessageCount,count=state.messages.length,last=count>0?state.messages[count-1]:null;const verified=Boolean(last?.id&&last.id!==state.lastRenderedMessageId&&count>before);list.innerHTML=count===0?'<div class="empty">Waiting for verified local signal output...</div>':state.messages.map(messageHtml).join('');if(typeof opts.preserveScrollTop==='number'){log.scrollTop=opts.preserveScrollTop;state.userScrolledLog=opts.preserveUserScrolled===true}else if(verified&&state.autoScroll&&!state.userScrolledLog){const node=list.lastElementChild;if(node&&typeof node.scrollIntoView==='function')node.scrollIntoView({block:'end',inline:'nearest',behavior:'smooth'})}if(last?.id)state.lastRenderedMessageId=last.id;state.previousMessageCount=count}
function messageHtml(m){const role=m?.role==='user'?'user':'bot';const badges=Array.isArray(m?.badges)?m.badges:[];const badgeHtml=badges.map(b=>`<span class="badge badge-${esc(String(b).toLowerCase())}">${esc(b)}</span>`).join('');const conf=Number.isFinite(Number(m?.confidence))?`<span>${Math.round(Number(m.confidence)*100)}%</span>`:'';return `<div class="msg msg-${role}" data-message-id="${esc(m?.id||'')}">${esc(m?.content||'')}<div class="meta">${badgeHtml}${conf}</div></div>`}
function appendMessage(m){const msg={id:id('msg'),role:m?.role==='user'?'user':'bot',content:safeText(m?.content,''),badges:Array.isArray(m?.badges)?m.badges:[],confidence:Number.isFinite(Number(m?.confidence))?Number(m.confidence):null};state.messages.push(msg);renderMessages()}
async function sendMessage(){const input=safeGet('chatInput');const value=(input?.value||state.draftInput||'').trim();if(!value||state.isSending)return;appendMessage({role:'user',content:value,badges:['LOCAL']});state.draftInput='';if(input)input.value='';state.isSending=true;disableSend(true);try{const res=await fetch(`${base()}/api/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:value})});if(!res?.ok)throw new Error(`HTTP ${res?.status||'unknown'}`);const data=await res.json().catch(()=>null);const reply=typeof data?.reply==='string'?data.reply:'';if(!reply)throw new Error('Malformed reply payload');setBackend(true);appendMessage({role:'bot',content:reply,badges:['RUST'],confidence:1})}catch(err){setBackend(false);appendMessage({role:'bot',content:`Rust backend unavailable or malformed response: ${safeText(err?.message,'unknown error')}`,badges:['SIM'],confidence:.3})}finally{state.isSending=false;disableSend(false)}}
function disableSend(v){const b=safeGet('sendBtn');if(b)b.disabled=v===true}
async function probeBackend(){try{const res=await fetch(`${base()}/health`,{cache:'no-store'});if(!res?.ok)throw new Error(`HTTP ${res?.status||'unknown'}`);const data=await res.json().catch(()=>null);setBackend(data?.backend==='rust'&&data?.simulation===false)}catch(_){setBackend(false)}}
function setBackend(ok){state.backendConnected=ok===true;state.simulationMode=!state.backendConnected;updateStatus()}
function updateStatus(){if(dom.connDot)dom.connDot.classList.toggle('ok',state.backendConnected);text('connLabel',state.backendConnected?'RUST':'SIM');text('phaseText',state.phase.toUpperCase());text('backendState',state.backendConnected?'RUST':'SIM');text('phaseValue',state.phase.toUpperCase());if(dom.banner){dom.banner.classList.toggle('ok',state.backendConnected);dom.banner.textContent=state.backendConnected?'Rust backend verified - simulation mode off':'Simulation mode - backend not verified'}if(dom.footer)dom.footer.textContent=state.backendConnected?'Rust Backend / Localhost Only':'Simulation Fallback / Localhost Only'}
function text(id,value){const el=safeGet(id);if(el)el.textContent=safeText(value)}
function updateLiveMetrics(){state.metrics={entropy:clamp(state.metrics.entropy+(Math.random()-.5)*.22,.5,4.5),branchingRatio:clamp(state.metrics.branchingRatio+(Math.random()-.5)*.12,.2,1.8),correlationLength:clamp(state.metrics.correlationLength+(Math.random()-.5)*.6,1,8),avalancheExponent:clamp(state.metrics.avalancheExponent+(Math.random()-.5)*.08,.8,2),echoDepth:clamp(state.metrics.echoDepth+(Math.random()-.5)*.16,.1,.9),activeNeurons:Math.round(clamp(state.metrics.activeNeurons+(Math.random()-.5)*8,4,96))};state.neuronSignals=buildSignals().map((v,i)=>clamp(v+Math.sin(Date.now()/900+i)*.08,.02,1));state.cosineSeries=buildSeries().map((p,i)=>({x:p.x,y:clamp(p.y+Math.sin(Date.now()/1200+i*.13)*.04,-.3,.5)}))}
function renderMetricsOnly(){text('entropyMetric',state.metrics.entropy.toFixed(1));text('branchingMetric',state.metrics.branchingRatio.toFixed(2));text('corrMetric',state.metrics.correlationLength.toFixed(1));text('avalancheMetric',state.metrics.avalancheExponent.toFixed(2));text('echoValue',`${Math.round(state.metrics.echoDepth*100)}%`);text('activeNeuronValue',String(state.metrics.activeNeurons));renderHeatmap(state.neuronSignals);renderPlot(state.cosineSeries)}
function renderHeatmap(data){const host=safeGet('heatmapHost');if(!host)return;try{if(!validNumbers(data))throw new Error('Malformed neuron signal data');host.className='heatmap';host.innerHTML=data.slice(0,256).map(raw=>{const v=clamp(raw,0,1),h=Math.round(150+v*75),a=(.24+v*.72).toFixed(2),l=Math.round(22+v*34);return `<div class="cell" title="${v.toFixed(3)}" style="background:hsla(${h},100%,${l}%,${a});box-shadow:0 0 ${Math.round(v*12)}px hsla(${h},100%,55%,.35)"></div>`}).join('')}catch(_){host.className='fallback';host.innerHTML='<div>Waiting for neuron signals...</div>'}}
function renderPlot(series){const host=safeGet('plotHost');if(!host)return;try{if(!validSeries(series))throw new Error('Malformed cosine series');const plotly=window.Plotly;if(plotly&&typeof plotly.newPlot==='function'){plotly.newPlot(host,[{x:series.map(p=>p.x),y:series.map(p=>p.y),type:'scatter',mode:'lines+markers',line:{color:'#00e5ff'}}],{margin:{l:35,r:8,t:8,b:28},paper_bgcolor:'#0b0f16',plot_bgcolor:'#0b0f16',font:{color:'#f3f4f6'}},{displayModeBar:false,responsive:true});return}host.innerHTML=svgPlot(series)}catch(_){host.innerHTML='<div class="fallback">Waiting for neuron signals...</div>'}}
function svgPlot(series){const w=520,h=190,pad=24,xs=series.map(p=>Number(p.x)),ys=series.map(p=>Number(p.y)),minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys),sx=x=>pad+((x-minX)/Math.max(1,maxX-minX))*(w-pad*2),sy=y=>h-pad-((y-minY)/Math.max(.001,maxY-minY))*(h-pad*2);const pts=series.map(p=>`${sx(Number(p.x)).toFixed(1)},${sy(Number(p.y)).toFixed(1)}`).join(' ');const dots=series.filter((_,i)=>i%5===0).map(p=>`<circle cx="${sx(Number(p.x)).toFixed(1)}" cy="${sy(Number(p.y)).toFixed(1)}" r="2.8" fill="#ffd84d"/>`).join('');return `<svg class="plot-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Cosine similarity plot"><rect x="0" y="0" width="${w}" height="${h}" fill="#0b0f16"/><path d="M${pad} ${pad}V${h-pad}H${w-pad}" fill="none" stroke="#374151" stroke-width="1"/><polyline points="${pts}" fill="none" stroke="#00e5ff" stroke-width="2.2"/>${dots}<text x="${pad}" y="16" fill="#9ca3af" font-size="11">Plotly fallback: cosine trace</text></svg>`}
function initCanvas(){const canvas=safeGet('neuralCanvas');if(!canvas||typeof canvas.getContext!=='function')return;const ctx=canvas.getContext('2d');if(!ctx)return;const parts=Array.from({length:80},()=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0015,vy:(Math.random()-.5)*.0015}));const resize=debounce(()=>{const dpr=window.devicePixelRatio||1,rect=canvas.getBoundingClientRect();canvas.width=Math.max(1,Math.floor(rect.width*dpr));canvas.height=Math.max(1,Math.floor(rect.height*dpr));ctx.setTransform(dpr,0,0,dpr,0,0)},120);function frame(){const rect=canvas.getBoundingClientRect(),w=Math.max(1,rect.width),h=Math.max(1,rect.height);ctx.clearRect(0,0,w,h);ctx.fillStyle='#07080c';ctx.fillRect(0,0,w,h);for(const p of parts){p.x=(p.x+p.vx+1)%1;p.y=(p.y+p.vy+1)%1;ctx.beginPath();ctx.arc(p.x*w,p.y*h,1.8,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,.42)';ctx.fill()}window.requestAnimationFrame(frame)}window.addEventListener('resize',resize);resize();frame()}
window.addEventListener('error',event=>{try{appendMessage({role:'bot',content:`Frontend error boundary: ${safeText(event?.message,'unknown error')}`,badges:['ERROR'],confidence:.1})}catch(_){}});
window.addEventListener('unhandledrejection',event=>{try{appendMessage({role:'bot',content:`Async error boundary: ${safeText(event?.reason?.message||event?.reason,'unknown error')}`,badges:['ERROR'],confidence:.1})}catch(_){}});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
